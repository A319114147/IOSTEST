name: Test iOS Network Stack

on:
  workflow_dispatch:

jobs:
  test-swift:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Run Swift Script
        run: |
          swiftc jd_request_ios.swift -o jd_request_ios
          ./jd_request_ios
          
  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          
      - name: Run Go Script
        run: go run jd_request_ios.go
